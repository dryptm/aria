<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aria — Workflow Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f12; --bg2: #18181f; --bg3: #22222c;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8e6f0; --text2: #9e9bac; --text3: #5f5d6e;
    --accent: #7c6af7; --accent2: #9b8cf9; --accent-bg: rgba(124,106,247,0.12);
    --green: #3ecf8e; --amber: #f5a623; --red: #f06060;
    --radius: 14px; --radius-sm: 8px;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  .header { display: flex; align-items: center; gap: 12px; padding: 14px 20px; border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0; }
  .logo { width: 34px; height: 34px; background: linear-gradient(135deg, #7c6af7, #4facfe); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 15px; font-weight: 600; }
  .header p { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text3); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

  .memory-bar { display: flex; align-items: center; gap: 8px; padding: 8px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; flex-shrink: 0; scrollbar-width: none; }
  .memory-bar::-webkit-scrollbar { display: none; }
  .mlabel { font-size: 11px; color: var(--text3); white-space: nowrap; }
  .pill { display: flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--text2); white-space: nowrap; cursor: default; }
  .pdot { width: 6px; height: 6px; border-radius: 50%; }
  .pdot.gmail { background: #ea4335; } .pdot.calendar { background: #4285f4; } .pdot.user { background: var(--accent); } .pdot.default { background: var(--amber); }
  .no-mem { font-size: 11px; color: var(--text3); font-style: italic; }

  .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; scrollbar-width: thin; scrollbar-color: var(--border2) transparent; }
  .chat::-webkit-scrollbar { width: 4px; }
  .chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg { display: flex; gap: 10px; max-width: 84%; animation: fadeUp 0.2s ease; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }

  .avatar { width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 2px; }
  .msg.user .avatar { background: var(--accent-bg); border: 1px solid var(--accent); }
  .msg.assistant .avatar { background: linear-gradient(135deg, #7c6af7, #4facfe); }

  .mbody { display: flex; flex-direction: column; gap: 4px; }
  .msg.user .mbody { align-items: flex-end; }
  .bubble { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.65; }
  .msg.user .bubble { background: var(--accent-bg); border: 1px solid rgba(124,106,247,.3); border-bottom-right-radius: 4px; }
  .msg.assistant .bubble { background: var(--bg2); border: 1px solid var(--border2); border-bottom-left-radius: 4px; }
  .mtime { font-size: 11px; color: var(--text3); }

  .tool-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--text2); margin: 4px 0; }
  .tool-badge.ok { border-color: rgba(62,207,142,.4); color: var(--green); }

  .typing-bubble { padding: 12px 14px; }
  .dots { display: flex; gap: 4px; }
  .dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); animation: bounce 1.2s ease-in-out infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes bounce { 0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)} }

  .input-area { padding: 14px 20px; background: var(--bg2); border-top: 1px solid var(--border); flex-shrink: 0; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .chip { background: var(--bg3); border: 1px solid var(--border2); border-radius: 20px; padding: 5px 12px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .15s; }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .input-row { display: flex; align-items: flex-end; gap: 10px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 14px; padding: 10px 14px; transition: border-color .15s; }
  .input-row:focus-within { border-color: var(--accent); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-size: 14px; line-height: 1.5; resize: none; max-height: 120px; min-height: 22px; font-family: var(--font); scrollbar-width: none; }
  textarea::placeholder { color: var(--text3); }
  .send { background: var(--accent); border: none; border-radius: 9px; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: opacity .15s; }
  .send:hover:not(:disabled){opacity:.85} .send:disabled{opacity:.4;cursor:not-allowed}
  .send svg { width: 16px; height: 16px; }

  strong { font-weight: 600; color: var(--accent2); }
  code { font-family: monospace; font-size: 12px; background: var(--bg3); padding: 2px 5px; border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">✦</div>
  <div><h1>Aria</h1><p>Dynamic workflow agent</p></div>
  <div class="status"><div class="dot"></div><span id="status-text">Connected</span></div>
</div>

<div class="memory-bar" id="memory-bar">
  <span class="mlabel">Memory:</span>
  <span class="no-mem" id="no-mem">No saved integrations yet</span>
</div>

<div class="chat" id="chat"></div>

<div class="input-area">
  <div class="chips" id="chips">
    <div class="chip" onclick="chip(this)">Send an email via Gmail</div>
    <div class="chip" onclick="chip(this)">Schedule a meeting on my calendar</div>
    <div class="chip" onclick="chip(this)">What's on my calendar today?</div>
    <div class="chip" onclick="chip(this)">Search my inbox for something</div>
  </div>
  <div class="input-row">
    <textarea id="inp" placeholder="Tell me what you want to do..." rows="1"></textarea>
    <button class="send" id="send-btn" onclick="send()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API_BASE = "";           // same origin — change to "http://localhost:3000" if running locally
const USER_ID  = "user_" + (localStorage.getItem("aria_uid") || (() => { const id = Math.random().toString(36).slice(2); localStorage.setItem("aria_uid", id); return id; })());

let history = [];
let busy = false;

// ── Memory pills ──────────────────────────────────────────────────────────
function renderMemory(mem) {
  const bar  = document.getElementById("memory-bar");
  const noMem = document.getElementById("no-mem");
  bar.querySelectorAll(".pill").forEach(p => p.remove());
  const contacts = mem?.integrations?.contacts || {};
  const userName = mem?.user?.name;
  const pills = [];
  if (userName) pills.push({ label: userName, cls: "user" });
  const intKeys = Object.keys(mem?.integrations || {}).filter(k => k !== "contacts");
  intKeys.forEach(k => pills.push({ label: k, cls: k }));
  Object.values(contacts).forEach(c => pills.push({ label: c.name || c.email, cls: "default" }));
  if (pills.length === 0) { noMem.style.display = ""; return; }
  noMem.style.display = "none";
  pills.forEach(p => {
    const el = document.createElement("div");
    el.className = "pill";
    el.innerHTML = `<div class="pdot ${p.cls}"></div>${p.label}`;
    bar.appendChild(el);
  });
}

// ── Message rendering ─────────────────────────────────────────────────────
function fmt(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/`(.*?)`/g, "<code>$1</code>")
    .replace(/(https?:\/\/[^\s<>"]+)/g, '<a href="$1" target="_blank" style="color:#9b8cf9;text-decoration:underline;word-break:break-all;">$1</a>')
    .replace(/\n/g, "<br>");
}

function addMsg(role, html, toolsUsed = []) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  const ava = role === "user" ? "👤" : "✦";
  let extra = "";
  if (toolsUsed.length) {
    extra = toolsUsed.map(t => `<div class="tool-badge ok">✓ ${t}</div>`).join("");
  }
  div.innerHTML = `
    <div class="avatar">${ava}</div>
    <div class="mbody">
      ${extra}
      <div class="bubble">${html}</div>
      <div class="mtime">${new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}</div>
    </div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function addTyping() {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg assistant";
  div.innerHTML = `<div class="avatar">✦</div><div class="mbody"><div class="bubble typing-bubble"><div class="dots"><span></span><span></span><span></span></div></div></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
function removeTyping() { document.getElementById("typing")?.remove(); }

// ── Send ──────────────────────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById("inp");
  const text = inp.value.trim();
  if (!text || busy) return;
  busy = true;
  document.getElementById("send-btn").disabled = true;
  document.getElementById("chips").style.display = "none";
  inp.value = ""; inp.style.height = "";
  addMsg("user", fmt(text));
  history.push({ role: "user", content: text });
  addTyping();

  try {
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ userId: USER_ID, messages: history })
    });
    removeTyping();

    if (!res.ok) {
      const err = await res.json();
      addMsg("assistant", `Sorry, something went wrong: ${err.error}`);
      busy = false;
      document.getElementById("send-btn").disabled = false;
      return;
    }

    const data = await res.json();
    addMsg("assistant", fmt(data.reply), data.toolsUsed || []);
    history.push({ role: "assistant", content: data.reply });
    if (data.memory) renderMemory(data.memory);

  } catch(e) {
    removeTyping();
    addMsg("assistant", `Connection error: ${e.message}. Is the server running?`);
  }

  busy = false;
  document.getElementById("send-btn").disabled = false;
}

// ── Chips & textarea ──────────────────────────────────────────────────────
function chip(el) { document.getElementById("inp").value = el.textContent; document.getElementById("chips").style.display = "none"; send(); }

document.getElementById("inp").addEventListener("input", function() {
  this.style.height = ""; this.style.height = Math.min(this.scrollHeight, 120) + "px";
});
document.getElementById("inp").addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } });

// ── Init ──────────────────────────────────────────────────────────────────
(async () => {
  try {
    const res = await fetch(`${API_BASE}/api/memory/${USER_ID}`);
    const data = await res.json();
    renderMemory(data.memory);
    const name = data.memory?.user?.name;
    addMsg("assistant", name
      ? `Welcome back, <strong>${name}</strong>! What would you like to do?`
      : `Hey! I'm <strong>Aria</strong>, your personal workflow agent.<br><br>I can send emails, manage your calendar, and more — just tell me what you need. If it's something new, I'll figure out how to connect it on the spot.`
    );
  } catch(e) {
    addMsg("assistant", `Hey! I'm <strong>Aria</strong>. I couldn't reach the server — make sure it's running at <code>localhost:3000</code>.`);
    document.getElementById("status-text").textContent = "Disconnected";
  }
})();
</script>
</body>
</html>
